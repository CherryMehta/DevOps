name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        run: |
         docker build -t cherrymehta07/backend:latest ./real_estate_ai
         docker push cherrymehta07/backend:latest

      - name: Build & Push Frontend
        run: |
         docker build -t cherrymehta07/frontend:latest ./real-estate-ai-frontend
         docker push cherrymehta07/frontend:latest

      # 🚀 Deploy to EC2
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 13.204.14.38
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Clone repo if not present
            if [ ! -d "/home/ubuntu/Devops" ]; then
              git clone https://github.com/CherryMehta/DevOps /home/ubuntu/Devops
            fi

            cd /home/ubuntu/Devops
            git pull origin main

            # Add environment variable
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > backend/.env

            cd infra

            # Stop & remove old containers
            sudo docker stop $(sudo docker ps -q) 2>/dev/null || true
            sudo docker rm $(sudo docker ps -aq) 2>/dev/null || true

            # Pull latest images
            sudo docker-compose pull

            # Run containers
            sudo docker-compose up -d