name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        run: |
          docker build -t cherrymehta07/backend:latest ./real_estate_ai
          docker push cherrymehta07/backend:latest

      - name: Build & Push Frontend
        run: |
          docker build -t cherrymehta07/frontend:latest ./real-estate-ai-frontend
          docker push cherrymehta07/frontend:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 13.204.14.38
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e

            if [ ! -d "/home/ubuntu/Devops" ]; then
              git clone https://github.com/CherryMehta/DevOps /home/ubuntu/Devops
            fi

            cd /home/ubuntu/Devops
            git pull origin main

            cat <<EOF > real_estate_ai/.env
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            EOF

            cd infra

            sudo docker compose down || true
            sudo docker compose pull
            sudo docker compose up -d --remove-orphans
            sudo docker image prune -f


