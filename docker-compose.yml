version: '3'

services:
backend:
build: ./real_estate_ai
ports:
- "8000:8000"
env_file:
- ./real_estate_ai/.env

frontend:
build: ./real-estate-ai-frontend
ports:
- "80:80"
depends_on:
- backend

mongodb:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
